
<!DOCTYPE html>

<meta charset="UTF-8" />

<!-- Google Font -->

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#060b18;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top left,#1f3c88 0%,transparent 30%),
radial-gradient(circle at bottom right,#00c9a7 0%,transparent 25%),
linear-gradient(135deg,#050816,#0c1c38,#081120);
z-index:-2;
}

/* GLOW EFFECT */
.glow{
position:absolute;
width:350px;
height:350px;
background:#00ffd5;
filter:blur(140px);
opacity:0.12;
top:-100px;
right:-100px;
z-index:-1;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
padding:20px;
text-align:center;
}

/* CARD */
.card{
margin-top:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
padding:28px 22px;
border-radius:28px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* PROFILE IMAGE */
.profile-img{
width:130px;
height:130px;
border-radius:50%;
border:4px solid #00ffd5;
object-fit:cover;
box-shadow:0 0 25px rgba(0,255,213,0.4);
}

/* TITLE */
.title{
font-size:28px;
font-weight:800;
margin-top:18px;
background:linear-gradient(90deg,#00ffd5,#00aaff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SUBTITLE */
.subtitle{
margin-top:8px;
font-size:15px;
color:#cfd9ff;
font-weight:500;
line-height:1.5;
}

/* COUNTER */
.counter{
margin-top:14px;
font-size:14px;
font-weight:600;
color:#00ffd5;
}

/* FEATURES */
.features{
margin-top:22px;
display:flex;
flex-direction:column;
gap:14px;
}

.feature-box{
background:rgba(255,255,255,0.05);
padding:14px;
border-radius:16px;
font-size:15px;
font-weight:600;
border:1px solid rgba(255,255,255,0.06);
transition:0.3s;
}

.feature-box:hover{
transform:translateY(-3px);
background:rgba(255,255,255,0.08);
}

/* BUTTON */
.join-btn{
margin-top:28px;
background:linear-gradient(90deg,#00ffd5,#00aaff);
padding:17px;
border-radius:18px;
font-size:18px;
font-weight:800;
color:#001018;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 25px rgba(0,255,213,0.35);
animation:pulse 2s infinite;
user-select:none;
}

.join-btn:hover{
transform:scale(1.03);
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.04);}
100%{transform:scale(1);}
}

/* ADS */
.ads{
margin-top:22px;
}

.ads a{
display:inline-block;
padding:10px 18px;
border-radius:50px;
background:rgba(255,255,255,0.06);
color:#00ffd5;
text-decoration:none;
font-size:13px;
border:1px solid rgba(255,255,255,0.1);
}

/* DISCLAIMER */
.disclaimer{
margin-top:30px;
padding:18px;
font-size:12px;
line-height:1.8;
color:#b8c2d9;
background:rgba(255,255,255,0.04);
border-top:1px solid rgba(255,255,255,0.06);
}

/* MOBILE */
@media(max-width:480px){

.title{
font-size:24px;
}

.card{
padding:24px 18px;
}

}

</style>
